<script>
    async function validar(codigoManual = null) {
        const inputVal = document.getElementById('codigoInput').value.trim();
        const codigo = codigoManual || inputVal;
        const res = document.getElementById('resultado');
        // Seleciona o container principal para mudar a cor de fundo
        const container = document.querySelector('.container'); 
        const titulo = document.querySelector('.container h2');

        if (!codigo) return;

        // Preenche o campo de input caso venha via QR Code
        document.getElementById('codigoInput').value = codigo;

        // Reset visual padrão (caso haja uma consulta anterior)
        container.style.backgroundColor = "white";
        titulo.style.color = "#1a1a1a";

        try {
            const response = await fetch('./certificados.json');
            const data = await response.json();
            // Certifique-se que o seu JSON tem a propriedade 'status' (ex: "Ativo" ou "Vencido")
            const certificado = data.find(c => c.codigo === codigo); 
            
            res.style.display = "block";
            
            if (certificado) {
                // --- LÓGICA NOVA AQUI ---
                if (certificado.status === 'Vencido') {
                    // Altera o fundo para vermelho se estiver vencido
                    container.style.backgroundColor = "#dc3545"; // Vermelho Bootstrap
                    titulo.style.color = "white";
                    
                    res.style.backgroundColor = "#f8d7da"; // Fundo da caixa de msg
                    res.style.color = "#721c24";
                    res.innerHTML = `<strong>Atenção: Certificado Vencido</strong><br>
                                     Aluno: ${certificado.aluno}<br>
                                     Vencimento: ${certificado.data}<br>
                                     Status: ${certificado.status}`;
                } else {
                    // Mantém verde se estiver "Ativo" ou outro status válido
                    container.style.backgroundColor = "white"; // Garante o fundo branco
                    titulo.style.color = "#1a1a1a"; // Garante o título preto

                    res.style.backgroundColor = "#d4edda"; // Fundo verde claro
                    res.style.color = "#155724";
                    res.innerHTML = `<strong>Certificado Autêntico</strong><br>
                                     Aluno: ${certificado.aluno}<br>
                                     Emissão: ${certificado.data}<br>
                                     Status: ${certificado.status}`;
                }
                // -------------------------

            } else {
                // Caso o código não exista no JSON
                res.style.backgroundColor = "#fff3cd"; // Amarelo
                res.style.color = "#856404";
                res.innerHTML = "Código não encontrado.";
            }
        } catch (error) {
            // Erro de conexão ou arquivo JSON não encontrado
            res.style.display = "block";
            res.style.backgroundColor = "#e2e3e5"; // Cinza
            res.style.color = "#383d41";
            res.innerHTML = "Erro ao buscar dados do servidor.";
            console.error(error);
        }
    }

    // --- Captura automática via Hash (#) ---
    window.onload = () => {
        const hash = window.location.hash.substring(1); 
        if (hash) {
            validar(hash); 
        }
    };
</script>
